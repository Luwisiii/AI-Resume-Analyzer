name: Django CI (Backend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    runs-on: windows-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: ai_resume_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_resume_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: ai_resume_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for PostgreSQL
        run: |
          Write-Host "Waiting for PostgreSQL to be ready..."
          for ($i = 0; $i -lt 10; $i++) {
            try {
              psql -h localhost -U postgres -d ai_resume_db -c '\l'
              Write-Host "PostgreSQL is ready!"
              break
            } catch {
              Write-Host "PostgreSQL not ready yet, retrying..."
              Start-Sleep -Seconds 5
            }
          }

      - name: Run Django migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run Django tests
        working-directory: backend
        run: python manage.py test
